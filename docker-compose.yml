services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: pricemap
      POSTGRES_USER: pricemap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricemap_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricemap"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./scripts/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pricemap:${POSTGRES_PASSWORD:-pricemap_dev}@postgres:5432/pricemap
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      MODEL_ARTIFACTS_DIR: /app/ml_artifacts
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./ml/artifacts:/app/ml_artifacts
      - ./data/osm_cache:/app/data/osm_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    command: npm run dev

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./scripts/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pricemap:${POSTGRES_PASSWORD:-pricemap_dev}@postgres:5432/pricemap
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      MODEL_ARTIFACTS_DIR: /app/ml_artifacts
    volumes:
      - ./backend/src:/app/src
      - ./ml/artifacts:/app/ml_artifacts
      - ./data/osm_cache:/app/data/osm_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A src.core.celery_app worker --loglevel=info

volumes:
  pgdata:
  redisdata:
