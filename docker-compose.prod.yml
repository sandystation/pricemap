# Production stack for a single VM: postgres + redis + backend API + Celery worker
# + Next.js frontend + Caddy. Postgres backs Auth.js accounts (email/password +
# Google OAuth). Bring up with:
#   docker compose -f docker-compose.prod.yml up -d --build
# Requires a .env file in this directory (see .env.prod.example).
name: pricemap-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    # No published port: only reachable on the compose network. Backs Auth.js
    # (users / accounts / sessions / verification tokens + hashed passwords).
    environment:
      POSTGRES_DB: casaval
      POSTGRES_USER: casaval
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auth.js adapter schema — runs automatically only on a fresh volume.
      # For an already-initialized volume, apply it manually (see the SQL header).
      - ./infra/postgres/auth-schema.sql:/docker-entrypoint-initdb.d/10-auth-schema.sql:ro
      - ./infra/postgres/app-schema.sql:/docker-entrypoint-initdb.d/20-app-schema.sql:ro
      - ./infra/postgres/listings-schema.sql:/docker-entrypoint-initdb.d/30-listings-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casaval -d casaval"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No published port: only reachable on the compose network.
    # AOF persistence so job status + rate-limit/global-cap counters survive a
    # restart (Redis is the sole store for all of them + the Celery broker).
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    # No published host port: the app is reachable ONLY via Caddy, so the
    # X-Real-IP / X-Forwarded-For used for rate limiting cannot be spoofed.
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      MODEL_ARTIFACTS_DIR: /app/ml_artifacts
      VALUATION_UPLOAD_DIR: /uploads
    volumes:
      # Shared with the worker so it can read images the API wrote (CRITICAL).
      - uploads:/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/openapi.json').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      MODEL_ARTIFACTS_DIR: /app/ml_artifacts
      VALUATION_UPLOAD_DIR: /uploads
    volumes:
      # Same named volume + path as the backend so uploaded images are visible.
      - uploads:/uploads
    depends_on:
      redis:
        condition: service_healthy
    # concurrency=1 keeps a single in-RAM copy of the LightGBM+XGBoost models
    # (module-level singleton) — right for the 3.7 GB box. Raise only if RAM allows.
    command: celery -A src.core.celery_app worker --loglevel=info --concurrency=1
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.core.celery_app inspect ping -d celery@$$(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # NEXT_PUBLIC_* is baked at build time (browser-visible).
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN:?set API_DOMAIN in .env}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: unless-stopped
    # Server-side runtime secrets for Auth.js (from .env): DATABASE_URL, AUTH_SECRET,
    # API_JWT_SECRET, GOOGLE_CLIENT_ID/SECRET, RESEND_API_KEY.
    env_file:
      - .env
    environment:
      AUTH_URL: https://${SITE_DOMAIN:?set SITE_DOMAIN in .env}
      AUTH_TRUST_HOST: "true"
    # No published port — Caddy fronts it on the compose network.
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN in .env}
      SITE_DOMAIN: ${SITE_DOMAIN:?set SITE_DOMAIN in .env}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - backend
      - frontend
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
  uploads:
  caddydata:
  caddyconfig:
